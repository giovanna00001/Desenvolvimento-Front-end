<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cadastro</title>
</head>
<body>
  <body>
     <h1>Informações Pessoais</h1>
     <form action="index.html">
       <fieldset>
       <legend>Cadastro do Cliente</legend>
       
       <label for="nome">Nome:</label>
       <input type="text" placeholder="Digite o nome do cliente" size="30"><br><br>
       
       <label for="idade">Idade:</label>
       <input type="number" placeholder="Digite a idade" size="30"/><br><br>
       
       <label for="endereco">Endereço:</label>
       <input type="text" placeholder="Digite o endereço" size="30"/><br><br>
       
       <label for="cidade">Cidade:</label>
       <input type="text"  placeholder=" Digite a cidade" size="30"/><br><br>
       
       <label for="estado">Estado:</label>
       <input type="text" placeholder="PR" size="30" maxlength="2" /><br><br>
       
       <label for="cep">CEP:</label>
       <input type="text" placeholder="XXXXX-XXX" size="30"><br><br>
       
       <label for="telres">Tel/Res:</label>
       <input type="tel" placeholder="99 99999-9999" size="30"/><br><br>
       
       <label for="telcel">Tel/cel:</label>
       <input type="tel" placeholder="99 99999-9999"size="30"/><br><br>
       
       <label for="email">Email:</label>
       <input type="email" placeholder="Digite o endereço de email" size="30"/><br><br>
      
       <input type="submit" value="Enviar"/>
       <input type="submit" value="Voltar">
     <a href="index.html"></a>
       </fieldset>
     </form>
    </body>
</html>
